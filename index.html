<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vanta — AI Agent</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0A0A0A" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Inter', sans-serif; background: #fff; color: #0A0A0A; }
  .display { font-family: 'Space Grotesk', sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  button { cursor: pointer; font-family: inherit; }
  button:disabled { cursor: not-allowed; opacity: 0.4; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #D0D0D0; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ⚠️ IMPORTANT: put your own Anthropic API key between the quotes below.
// This key will be visible to anyone who views this page's source.
// Only use a key with a small balance you're comfortable exposing.
const ANTHROPIC_API_KEY = "PASTE_YOUR_API_KEY_HERE";

function VantaMark({ size = 32, pulsing = false }) {
  return (
    <div style={{ width: size, height: size }}>
      <svg viewBox="0 0 150 130" width={size} height={size}>
        <path d="M75 0 L150 130 L112.5 130 L75 65 L37.5 130 L0 130 Z" fill="#0A0A0A"
          style={pulsing ? { animation: "vpulse 1.1s ease-in-out infinite" } : undefined} />
        <circle cx="75" cy="45" r="9" fill="#FFFFFF" />
      </svg>
      <style>{`@keyframes vpulse{0%,100%{opacity:1}50%{opacity:.3}}`}</style>
    </div>
  );
}

function IconPaperclip(){return(<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0A0A0A" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.44 11.05l-9.19 9.19a5 5 0 0 1-7.07-7.07l9.19-9.19a3.5 3.5 0 0 1 4.95 4.95l-9.2 9.19a1.5 1.5 0 0 1-2.12-2.12l8.49-8.48"/></svg>);}
function IconMic(){return(<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0A0A0A" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/></svg>);}
function IconClose({color="#8A8A8A"}){return(<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>);}
function IconFile({color="#0A0A0A"}){return(<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>);}
function IconAlert(){return(<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#0A0A0A" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>);}

function WaveBars({active}) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:5,height:48}}>
      {[0,1,2,3,4,5,6].map(i=>(
        <div key={i} style={{width:4,borderRadius:2,background:"#FFFFFF",height:6,
          animation: active ? `wv 1s ease-in-out ${i*0.09}s infinite` : "none"}} />
      ))}
      <style>{`@keyframes wv{0%,100%{height:8px}50%{height:42px}}`}</style>
    </div>
  );
}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(",")[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

function VantaApp(){
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState("");
  const [pendingFile,setPendingFile]=useState(null);
  const [loading,setLoading]=useState(false);
  const [listening,setListening]=useState(false);
  const [liveTranscript,setLiveTranscript]=useState("");
  const [error,setError]=useState("");
  const [installPrompt,setInstallPrompt]=useState(null);
  const [isIOS,setIsIOS]=useState(false);
  const [showIOSHint,setShowIOSHint]=useState(false);
  const scrollRef=useRef(null);
  const fileInputRef=useRef(null);
  const recognitionRef=useRef(null);

  useEffect(()=>{scrollRef.current?.scrollTo({top:scrollRef.current.scrollHeight,behavior:"smooth"});},[messages,loading]);

  useEffect(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR) return;
    const rec=new SR();
    rec.lang="ar-SA";
    rec.continuous=true;
    rec.interimResults=true;
    rec.onresult=(e)=>{
      let finalText="",interimText="";
      for(let i=e.resultIndex;i<e.results.length;i++){
        const t=e.results[i][0].transcript;
        if(e.results[i].isFinal) finalText+=t; else interimText+=t;
      }
      if(finalText){ setInput(p=>p?p+" "+finalText:finalText); setLiveTranscript(""); }
      else setLiveTranscript(interimText);
    };
    rec.onend=()=>{setListening(false);setLiveTranscript("");};
    rec.onerror=()=>{setListening(false);setLiveTranscript("");};
    recognitionRef.current=rec;
  },[]);

  useEffect(()=>{
    const handler=(e)=>{e.preventDefault();setInstallPrompt(e);};
    window.addEventListener("beforeinstallprompt",handler);
    setIsIOS(/iphone|ipad|ipod/i.test(window.navigator.userAgent));
    return ()=>window.removeEventListener("beforeinstallprompt",handler);
  },[]);

  async function handleInstall(){
    if(installPrompt){ installPrompt.prompt(); await installPrompt.userChoice; setInstallPrompt(null); }
    else if(isIOS){ setShowIOSHint(true); }
  }

  function toggleListening(){
    if(!recognitionRef.current){ setError("Voice input isn't supported in this browser. Try Chrome."); return; }
    if(listening){ recognitionRef.current.stop(); setListening(false); }
    else { setError(""); recognitionRef.current.start(); setListening(true); }
  }

  async function handleFileSelect(e){
    const file=e.target.files?.[0];
    if(!file) return;
    setError("");
    const isImage=file.type.startsWith("image/");
    const isPdf=file.type==="application/pdf";
    if(!isImage && !isPdf){ setError("Only images or PDF files are supported right now."); return; }
    try{
      const base64=await fileToBase64(file);
      setPendingFile({name:file.name,type:isImage?"image":"pdf",base64,mediaType:file.type});
    }catch{ setError("Couldn't read that file."); }
  }

  async function sendMessage(){
    if(!input.trim() && !pendingFile) return;
    if(!ANTHROPIC_API_KEY || ANTHROPIC_API_KEY.includes("PASTE_YOUR")){
      setError("No API key set yet. Add your Anthropic API key in the code.");
      return;
    }
    setError("");
    const userMsg={role:"user",text:input.trim(),file:pendingFile?{name:pendingFile.name,type:pendingFile.type}:null};
    const newMessages=[...messages,userMsg];
    setMessages(newMessages);

    const content=[];
    if(input.trim()) content.push({type:"text",text:input.trim()});
    if(pendingFile){
      if(pendingFile.type==="image") content.push({type:"image",source:{type:"base64",media_type:pendingFile.mediaType,data:pendingFile.base64}});
      else content.push({type:"document",source:{type:"base64",media_type:"application/pdf",data:pendingFile.base64}});
    }

    setInput("");
    setPendingFile(null);
    setLoading(true);

    try{
      const apiMessages=newMessages.filter(m=>m.role==="user"||m.role==="assistant").slice(0,-1)
        .map(m=>({role:m.role,content:m.text||"(attached file)"}));
      apiMessages.push({role:"user",content});

      const response=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-api-key": ANTHROPIC_API_KEY,
          "anthropic-version":"2023-06-01",
          "anthropic-dangerous-direct-browser-access":"true"
        },
        body:JSON.stringify({
          model:"claude-sonnet-4-6",
          max_tokens:1000,
          system:"You are Vanta, a professional AI assistant. Reply in the same language the user writes in. Be concise, direct, and useful.",
          messages:apiMessages
        })
      });
      const data=await response.json();
      if(data.error){ throw new Error(data.error.message||"API error"); }
      const textBlocks=(data?.content||[]).filter(b=>b.type==="text");
      const replyText=textBlocks.map(b=>b.text).join("\n\n")||"Something went wrong. Try again.";
      setMessages(prev=>[...prev,{role:"assistant",text:replyText}]);
    }catch(err){
      setError("Connection error: "+err.message);
      setMessages(prev=>prev.slice(0,-1));
    }finally{ setLoading(false); }
  }

  function handleKeyDown(e){
    if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendMessage(); }
  }

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <header style={{display:"flex",alignItems:"center",gap:10,padding:"18px 24px",borderBottom:"1px solid #E5E5E5"}}>
        <VantaMark size={26} pulsing={loading} />
        <span className="display" style={{fontWeight:700,fontSize:18,letterSpacing:.5}}>VANTA</span>
        <span className="mono" style={{fontSize:11,color:"#B0B0B0",marginRight:"auto"}}>{loading?"THINKING…":"READY"}</span>
        {(installPrompt||isIOS) && (
          <button onClick={handleInstall} className="mono" style={{background:"#0A0A0A",color:"#FFFFFF",border:"none",padding:"8px 16px",fontSize:11,letterSpacing:.5,borderRadius:2}}>INSTALL</button>
        )}
      </header>

      <main ref={scrollRef} style={{flex:1,overflowY:"auto",padding:24,maxWidth:720,width:"100%",margin:"0 auto"}}>
        {messages.length===0 && !loading && (
          <div style={{height:"100%",minHeight:"50vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",color:"#C4C4C4"}}>
            <VantaMark size={40} />
            <p className="mono" style={{fontSize:12,letterSpacing:1,marginTop:20}}>Type, talk, or drop a file to start</p>
          </div>
        )}
        {messages.map((m,i)=>(
          <div key={i} style={{display:"flex",flexDirection:"column",alignItems:m.role==="user"?"flex-end":"flex-start",marginBottom:16}}>
            <div style={{maxWidth:"80%",padding:"12px 16px",borderRadius:4,background:m.role==="user"?"#0A0A0A":"#F2F2F2",color:m.role==="user"?"#FFFFFF":"#0A0A0A",fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap"}}>
              {m.file && (
                <div className="mono" style={{fontSize:11,marginBottom:m.text?8:0,opacity:.7,display:"flex",alignItems:"center",gap:6}}>
                  <IconFile color={m.role==="user"?"#FFFFFF":"#0A0A0A"} /> {m.file.type.toUpperCase()} — {m.file.name}
                </div>
              )}
              {m.text}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{display:"flex",alignItems:"center",gap:8,color:"#8A8A8A",fontSize:13}}>
            <VantaMark size={16} pulsing /> Analyzing…
          </div>
        )}
      </main>

      {error && (
        <div className="mono" style={{maxWidth:720,width:"100%",margin:"0 auto",padding:"8px 24px",fontSize:12,background:"#F2F2F2",display:"flex",alignItems:"center",gap:6}}>
          <IconAlert /> {error}
        </div>
      )}

      <footer style={{borderTop:"1px solid #E5E5E5",padding:"16px 24px 24px"}}>
        <div style={{maxWidth:720,margin:"0 auto"}}>
          {pendingFile && (
            <div className="mono" style={{display:"inline-flex",alignItems:"center",gap:8,fontSize:12,background:"#F2F2F2",padding:"6px 10px",borderRadius:3,marginBottom:10}}>
              <IconFile /> {pendingFile.name}
              <button onClick={()=>setPendingFile(null)} style={{background:"none",border:"none",display:"flex",alignItems:"center"}}><IconClose /></button>
            </div>
          )}
          <div style={{display:"flex",alignItems:"flex-end",gap:8,border:"1px solid #0A0A0A",borderRadius:4,padding:8}}>
            <input ref={fileInputRef} type="file" accept="image/*,application/pdf" onChange={handleFileSelect} style={{display:"none"}} />
            <button onClick={()=>fileInputRef.current?.click()} title="Attach an image or PDF" style={{background:"#F2F2F2",border:"none",borderRadius:3,width:36,height:36,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}><IconPaperclip/></button>
            <button onClick={toggleListening} title="Voice input" style={{background:listening?"#0A0A0A":"#F2F2F2",border:"none",borderRadius:3,width:36,height:36,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
              {listening?<div style={{width:10,height:10,borderRadius:"50%",background:"#FFFFFF"}}/>:<IconMic/>}
            </button>
            <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKeyDown} placeholder="Message Vanta…" rows={1}
              style={{flex:1,border:"none",resize:"none",fontSize:14,fontFamily:"inherit",padding:"8px 4px",maxHeight:120}} />
            <button onClick={sendMessage} disabled={loading||(!input.trim()&&!pendingFile)}
              style={{background:"#0A0A0A",color:"#FFFFFF",border:"none",borderRadius:3,padding:"10px 18px",fontSize:13,fontWeight:500,flexShrink:0}}>Send</button>
          </div>
          <div className="mono" style={{fontSize:10,color:"#C4C4C4",marginTop:8,textAlign:"center"}}>TEXT · VOICE · IMAGE · PDF</div>
        </div>
      </footer>

      {listening && (
        <div style={{position:"fixed",inset:0,background:"#0A0A0A",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:50,padding:24}}>
          <button onClick={toggleListening} style={{position:"absolute",top:28,right:28,background:"transparent",border:"none"}}><IconClose color="#FFFFFF"/></button>
          <div className="mono" style={{color:"#8A8A8A",fontSize:12,letterSpacing:2,marginBottom:28}}>LISTENING…</div>
          <WaveBars active />
          <div style={{maxWidth:560,minHeight:60,marginTop:40,padding:"0 16px",textAlign:"center",color:"#FFFFFF",fontSize:20,lineHeight:1.6}}>
            {liveTranscript || input || <span style={{color:"#5A5A5A"}}>Start talking…</span>}
          </div>
          <button onClick={toggleListening} style={{marginTop:48,background:"#FFFFFF",color:"#0A0A0A",border:"none",borderRadius:4,padding:"12px 32px",fontSize:14,fontWeight:500}}>Done, continue</button>
        </div>
      )}

      {showIOSHint && (
        <div style={{position:"fixed",inset:0,background:"rgba(10,10,10,0.6)",display:"flex",alignItems:"flex-end",zIndex:60}} onClick={()=>setShowIOSHint(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#FFFFFF",width:"100%",padding:"24px 24px 32px",borderRadius:"12px 12px 0 0",textAlign:"center"}}>
            <VantaMark size={28} />
            <p style={{fontSize:14,marginTop:16,lineHeight:1.7}}>Tap the <strong>Share</strong> icon in Safari, then <strong>"Add to Home Screen"</strong>.</p>
            <button onClick={()=>setShowIOSHint(false)} style={{marginTop:12,background:"#0A0A0A",color:"#FFFFFF",border:"none",borderRadius:4,padding:"10px 24px",fontSize:13}}>Got it</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<VantaApp />);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    const swCode = `
      self.addEventListener('fetch', () => {});
    `;
    const blob = new Blob([swCode], {type: 'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  });
}
</script>
</body>
</html>
